name: Build

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: photo-uploader-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: photo-uploader-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: photo-uploader-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - run: cargo build --release --target ${{ matrix.target }}

      - run: cp target/${{ matrix.target }}/release/photo-uploader${{ matrix.os == 'windows-latest' && '.exe' || '' }} ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - run: chmod +x photo-uploader-linux-amd64 photo-uploader-macos-amd64

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            photo-uploader-linux-amd64
            photo-uploader-macos-amd64
            photo-uploader-windows-amd64.exe
